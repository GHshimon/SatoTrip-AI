# Render Blueprint — SatoTrip バックエンド(FastAPI)
# 使い方: Render ダッシュボード → New → Blueprint → このリポジトリを選択。
# sync: false の環境変数は初回デプロイ時にダッシュボードで入力を求められます。
# 詳細手順: docs/DEPLOY_RENDER.md
services:
  - type: web
    name: satotrip-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GEMINI_API_KEY
        sync: false # Google AI Studio で発行したキー
      - key: DATABASE_URL
        sync: false # Supabase の接続文字列(postgresql://...)。未設定なら SQLite(再起動で消える)
      - key: JWT_SECRET_KEY
        generateValue: true # Render が強力なランダム値を自動生成
      - key: CORS_ORIGINS
        sync: false # フロントのURL(カンマ区切り)。例: https://sato-trip-ai-....vercel.app
      - key: FRONTEND_URL
        sync: false # パスワードリセットメール等のリンク先。CORS_ORIGINS の代表1つと同じでよい
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      # --- スポット収集（全国拡充）で必要。未設定だと「動くが0件収集」になる ---
      - key: YOUTUBE_API_KEY
        sync: false # YouTube Data API v3 のキー。収集の起点（未設定だと動画0件）
      - key: GOOGLE_MAPS_API_KEY
        sync: false # Places API(New)のキー。スポットの存在確認・営業時間・評価の取得に必須
                    # （未設定だと全候補が no_places_hit で棄却され0件）。要API制限（OWNER_TASKS #1）
      - key: DATA_COLLECTION_ENABLED
        value: "true" # 旧データ収集API(/api/admin/data-collection/*)を使う場合のみ必要。
                      # 一括追加(/api/spots/bulk-add-by-prefecture)には不要だが有効化しておく
