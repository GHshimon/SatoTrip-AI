user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip圧縮設定
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/javascript application/json;

    # バックエンドAPI（内部ネットワークの backend サービス）
    upstream backend {
        server backend:8000;
    }

    # --- HTTP: ヘルスチェックとACMEチャレンジ以外はHTTPSへリダイレクト ---
    server {
        listen 80;
        server_name _;

        # コンテナ／LBのヘルスチェック用（TLS不要）
        location = /healthz {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # Let's Encrypt (certbot) の webroot チャレンジ用
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # それ以外は HTTPS へ恒久リダイレクト
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS: TLS終端・SPA配信・APIリバースプロキシ ---
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # 証明書は docker-compose で ./certs をマウントして配置する
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        root /usr/share/nginx/html;
        index index.html;

        # セキュリティヘッダー
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline' https://accounts.google.com https://js.stripe.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https:; frame-src https://accounts.google.com https://js.stripe.com; font-src 'self' data:" always;

        # APIリバースプロキシ（バックエンドはホストに公開しない）
        location ~ ^/(api|auth|uploads|health|docs|openapi.json) {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # 静的アセット用のキャッシュ設定
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # SPA用のルーティング設定
        location / {
            try_files $uri $uri/ /index.html;
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
}
