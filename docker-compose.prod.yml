version: '3.8'

services:
  # PostgreSQLデータベース
  db:
    image: postgres:16-alpine
    container_name: satotrip-db
    environment:
      POSTGRES_USER: ${DB_USER:-satotrip}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-satotrip}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # DBはホストに公開しない。satotrip-network 内の backend からのみ接続する。
    # 外部から接続が必要な場合のみ、SSHトンネル等の安全な経路を使うこと。
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-satotrip}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - satotrip-network
    restart: unless-stopped

  # Redis（レート制限の共有ストア）
  redis:
    image: redis:7-alpine
    container_name: satotrip-redis
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - satotrip-network
    restart: unless-stopped

  # バックエンドAPI
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: satotrip-backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-satotrip}:${DB_PASSWORD}@db:5432/${DB_NAME:-satotrip}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ENVIRONMENT: production
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      OPENCAGE_API_KEY: ${OPENCAGE_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: ${FRONTEND_URL:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@satotrip.example.com}
    volumes:
      # アップロード（アバター等）を永続化する
      - uploads_data:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # バックエンドもホストに直接公開せず、frontend(nginx)のリバースプロキシ経由にするのが望ましい。
    expose:
      - "8000"
    networks:
      - satotrip-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # フロントエンド（nginx、TLS終端）
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: satotrip-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # TLS証明書をマウントする（Let's Encrypt 等で取得したものを ./certs に配置）
      # 例: ./certs/fullchain.pem, ./certs/privkey.pem
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    networks:
      - satotrip-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  satotrip-network:
    driver: bridge
